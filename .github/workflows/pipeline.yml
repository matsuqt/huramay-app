name: Master CI/CD Pipeline

# Trigger this automatically when code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # STAGE 1: CONTINUOUS INTEGRATION (TESTING)
  # ==========================================
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest tests/

  # ==========================================
  # STAGE 2: CONTAINERIZATION (DOCKER)
  # ==========================================
  build-and-push-docker:
    needs: test-backend # This ensures Docker ONLY builds if tests pass!
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/huramay-backend:latest

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT (RENDER)
  # ==========================================
  deploy-to-render:
    needs: build-and-push-docker # This ensures Render ONLY updates if Docker succeeds!
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Webhook
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"