name: Master CI/CD Pipeline

# Trigger this automatically when code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # STAGE 1: CONTINUOUS INTEGRATION (TESTING)
  # ==========================================
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest tests/

 # ==========================================
  # STAGE 1: CONTINUOUS INTEGRATION (TESTING)
  # ==========================================
  test-backend:
    runs-on: ubuntu-latest
    # Tell GitHub to run all commands inside the backend folder
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest tests/

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT (RENDER)
  # ==========================================
  deploy-to-render:
    needs: build-and-push-docker # This ensures Render ONLY updates if Docker succeeds!
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Webhook
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"