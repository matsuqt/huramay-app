name: Full-Stack CI Pipeline

# 1. The Trigger: This pipeline runs every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # BACKEND: PYTHON TESTING
  # ==========================================
  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    # If your python code is in a specific folder, uncomment the next two lines:
    # defaults:
    #   run: working-directory: ./backend 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Change this to your specific Python version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests (Pytest)
        run: python -m pytest tests/

  # ==========================================
  # FRONTEND: FLUTTER BUILD & TEST
  # ==========================================
  build-flutter:
    name: Build Flutter App
    runs-on: ubuntu-latest
    # If your flutter code is in a specific folder, uncomment the next two lines:
    # defaults:
    #   run: working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java (Required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Uses the latest stable Flutter release

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Run Flutter Tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk