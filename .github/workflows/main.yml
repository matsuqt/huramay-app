name: Huramay Essential Testing

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # JOB 1: TEST BACKEND ONLY
  # ==========================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        run: python -m pytest tests/ -q 

  # ==========================================
  # JOB 2: TEST FRONTEND ONLY
  # ==========================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    # Notice: No working-directory needed here!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Check for Syntax Errors
        run: flutter analyze
        continue-on-error: true

      - name: Run Flutter Tests
        run: flutter test