name: Huramay CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch

jobs:
  # ==========================================
  # JOB 1: TEST & DEPLOY BACKEND (PYTHON)
  # ==========================================
  backend:
    name: Test and Deploy Backend
    runs-on: ubuntu-latest
    # Tells GitHub your Python code is inside the backend folder
    defaults:
      run:
        working-directory: ./backend 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Matching the version from your terminal

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -m pytest tests/ -v

      # This is the "CD" part! It only runs if the tests pass.
      - name: Deploy to Render
        if: success() 
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # ==========================================
  # JOB 2: BUILD FRONTEND (FLUTTER)
  # ==========================================
  frontend:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Save APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: huramay-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk